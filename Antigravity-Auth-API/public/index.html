<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY // AUTH DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0b0b12;
            --sidebar: #12121e;
            --accent: #00e5ff;
            --accent-glow: rgba(0, 229, 255, 0.4);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --gradient: linear-gradient(135deg, #00e5ff 0%, #006aff 100%);
        }

        body { background: var(--bg); color: var(--text-main); font-family: 'Outfit', sans-serif; overflow-x: hidden; display: flex; min-height: 100vh; }

        /* Sidebar Pro */
        nav { width: 280px; background: var(--sidebar); padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 26px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 50px; letter-spacing: 1px; }

        .nav-link { padding: 15px 20px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; color: var(--text-dim); display: flex; align-items: center; gap: 15px; font-weight: 600; }
        .nav-link:hover, .nav-link.active { background: rgba(0, 229, 255, 0.1); color: var(--accent); }

        /* Dashboard Area */
        main { flex: 1; padding: 40px 60px; max-width: 1400px; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 40px; }

        /* Grid de Stats */
        .stats-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); padding: 30px; border-radius: 25px; backdrop-filter: blur(10px); }
        .stat-card h3 { font-size: 13px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px; }
        .stat-card p { font-size: 40px; font-weight: 800; color: var(--accent); }

        /* Generador */
        .glass-panel { background: var(--card-bg); border-radius: 30px; border: 1px solid rgba(255,255,255,0.08); padding: 40px; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .glass-panel h2 { font-size: 20px; margin-bottom: 30px; }
        
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: flex-end; }
        .input-box { display: flex; flex-direction: column; gap: 10px; }
        .input-box label { font-size: 13px; color: var(--text-dim); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); box-shadow: 0 0 20px var(--accent-glow); }

        .btn-gen { background: var(--gradient); border: none; padding: 16px; border-radius: 12px; color: #000; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-gen:hover { transform: scale(1.02); box-shadow: 0 10px 30px var(--accent-glow); }

        /* Tabla de licencias */
        .table-area { background: var(--card-bg); border-radius: 25px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        td { padding: 18px 15px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        
        .key-tag { font-family: 'JetBrains Mono', monospace; background: rgba(0, 229, 255, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--accent-glow); }
        .badge { padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; }
        .badge-active { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        
        .btn-delete { background: rgba(255, 62, 62, 0.1); color: #ff3e3e; border: 1px solid rgba(255, 62, 62, 0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: #ff3e3e; color: #fff; }

        /* Loader */
        .loading-bar { height: 3px; background: var(--accent); position: fixed; top: 0; left: 0; width: 0; transition: 0.5s; z-index: 100; }
    </style>
</head>
<body>
    <div class="loading-bar" id="loader"></div>

    <nav>
        <div class="logo">INFINITY // CORE</div>
        <div class="nav-link active">DASHBOARD</div>
        <div class="nav-link">USER MANAGEMENT</div>
        <div class="nav-link">SPOOFER LOGS</div>
        <div class="nav-link">SYSTEM SECURITY</div>
        <div class="nav-link" style="margin-top: 50px; color: #ff3e3e;">SIGN OUT</div>
    </nav>

    <main>
        <h1>SYSTEM OVERVIEW</h1>

        <div class="stats-container">
            <div class="stat-card"><h3>Active Licenses</h3><p id="stat-active">0</p></div>
            <div class="stat-card"><h3>Total Users</h3><p id="stat-total">0</p></div>
            <div class="stat-card"><h3>Global Bans</h3><p id="stat-bans">124</p></div>
        </div>

        <section class="glass-panel">
            <h2>KEY GENERATOR ENGINE</h2>
            <div class="form-grid">
                <div class="input-box"><label>Duration</label><input type="number" id="days" value="30"></div>
                <div class="input-box"><label>Limit Usages</label><input type="number" id="usages" value="1"></div>
                <div class="input-box"><label>Identifier / Note</label><input type="text" id="note" placeholder="VIP Customer #1"></div>
                <button class="btn-gen" onclick="generateKey()">Authorize New Key</button>
            </div>
        </section>

        <section class="table-area">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <h2>REGISTERED LICENSES</h2>
                <button onclick="loadKeys()" style="background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 8px 15px; border-radius: 8px; cursor: pointer;">REFRESH</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Access Key</th>
                        <th>Expiry Mode</th>
                        <th>Device Limit</th>
                        <th>Status</th>
                        <th>Expiration</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="key-table">
                    <!-- Dynamic -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        const ADMIN_TOKEN = "antigravity_admin_secret_2026";
        const API_URL = ""; // Empty string uses relative paths (works on Render)

        async function loadKeys() {
            document.getElementById('loader').style.width = '70%';
            try {
                const res = await fetch(`${API_URL}/api/admin/keys?token=${ADMIN_TOKEN}`);
                const data = await res.json();
                
                const table = document.getElementById('key-table');
                table.innerHTML = '';
                
                document.getElementById('stat-active').innerText = data.keys.length;
                document.getElementById('stat-total').innerText = data.keys.length;

                data.keys.reverse().forEach(k => {
                    const expiry = k.expires_at ? new Date(k.expires_at).toLocaleDateString() : 'LIFETIME';
                    table.innerHTML += `
                        <tr>
                            <td><span class="key-tag">${k.key}</span></td>
                            <td>${k.days === 0 ? 'LIFETIME' : k.days + ' Days'}</td>
                            <td>${k.current_usages}/${k.max_usages} HWID</td>
                            <td><span class="badge badge-active">AUTHENTICATED</span></td>
                            <td>${expiry}</td>
                            <td><button class="btn-delete" onclick="deleteKey('${k.key}')">REVOKE</button></td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error(err);
            }
            document.getElementById('loader').style.width = '100%';
            setTimeout(() => document.getElementById('loader').style.width = '0', 400);
        }

        async function generateKey() {
            const days = document.getElementById('days').value;
            const usages = document.getElementById('usages').value;
            const note = document.getElementById('note').value;

            const res = await fetch(`${API_URL}/api/admin/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: ADMIN_TOKEN, days, max_usages: usages, note })
            });

            const data = await res.json();
            if (data.success) {
                Swal.fire({
                    title: 'SUCCESS!',
                    text: `Key Generated: ${data.key.key}`,
                    icon: 'success',
                    background: '#12121e',
                    color: '#fff',
                    confirmButtonColor: '#00e5ff'
                });
                loadKeys();
            }
        }

        async function deleteKey(key) {
            const result = await Swal.fire({
                title: 'Are you sure?',
                text: "This will permanently revoke access for this key!",
                icon: 'warning',
                showCancelButton: true,
                background: '#12121e',
                color: '#fff',
                confirmButtonColor: '#ff3e3e',
                confirmButtonText: 'YES, REVOKE'
            });

            if (result.isConfirmed) {
                await fetch(`${API_URL}/api/admin/keys/${key}?token=${ADMIN_TOKEN}`, { method: 'DELETE' });
                loadKeys();
            }
        }

        loadKeys();
    </script>
</body>
</html>
