<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY AUTH // v3.0 ENTERPRISE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --bg: #08080c; --sidebar: #0e0e16; --accent: #7000ff; --accent-glow: rgba(112, 0, 255, 0.4); --text: #fff; --glass: rgba(255,255,255,0.03); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

        /* Sidebar Moderno */
        nav { width: 300px; background: var(--sidebar); padding: 40px 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 60px; text-shadow: 0 0 20px var(--accent-glow); text-align: center; }
        .nav-link { padding: 18px 25px; border-radius: 15px; cursor: pointer; color: rgba(255,255,255,0.4); margin-bottom: 10px; transition: 0.3s; font-weight: 600; font-size: 15px; }
        .nav-link:hover, .nav-link.active { background: rgba(112, 0, 255, 0.1); color: var(--accent); }

        /* Area Principal */
        main { flex: 1; padding: 50px 70px; }
        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Paneles Glass */
        .glass-panel { background: var(--glass); border: 1px solid rgba(255,255,255,0.05); border-radius: 30px; padding: 40px; margin-bottom: 30px; backdrop-filter: blur(10px); }
        h1 { font-size: 36px; margin-bottom: 30px; }

        /* Inputs y Botones Premium */
        .form-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 12px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; color: #fff; outline: none; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        
        .btn { background: var(--accent); border: none; padding: 15px 30px; border-radius: 12px; color: white; font-weight: 800; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--accent-glow); }

        /* Tablas */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; font-size: 11px; opacity: 0.3; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid rgba(255,255,255,0.03); font-size: 14px; }
        .key-style { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--accent); }

        /* Logs y Mini Cards */
        .log-entry { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); display: flex; justify-content: space-between; font-size: 13px; }
        .log-date { opacity: 0.3; }
        .log-event { font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">INFINITY // v3</div>
        <div class="nav-link active" onclick="showTab('keys')">LICENSES / BULK</div>
        <div class="nav-link" onclick="showTab('logs')">SYSTEM LOGS</div>
        <div class="nav-link" onclick="showTab('bans')">BANS / SECURITY</div>
        <div class="nav-link" onclick="showTab('settings')" style="margin-top: 40px; opacity: 0.5;">SETTINGS</div>
    </nav>

    <main>
        <!-- PESTAÑA LICENCIAS -->
        <div id="keys" class="tab-content active">
            <h1>LICENSE MANAGER</h1>
            <div class="glass-panel">
                <div class="form-row">
                    <div class="input-group"><label>Days (0=Life)</label><input type="number" id="days" value="30"></div>
                    <div class="input-group"><label>Limit</label><input type="number" id="usages" value="1"></div>
                    <div class="input-group"><label>Amount</label><input type="number" id="amount" value="1"></div>
                    <div class="input-group"><label>Identifier</label><input type="text" id="note" placeholder="VIP Sale"></div>
                </div>
                <button class="btn" style="margin-top: 20px;" onclick="bulkGen()">GENERATE BULK LICENSES</button>
            </div>

            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2>REGISTERED LICENSES</h2>
                    <button onclick="copyAllKeys()" style="background: var(--accent); color: #000; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 800; border: none; font-size: 12px;">COPY ALL KEYS (FOR BILLGANG)</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Secret License Key</th><th>Mode</th><th>Device</th><th>Expiry</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="key-table"></tbody>
                </table>
            </div>
        </div>

        <!-- PESTAÑA LOGS -->
        <div id="logs" class="tab-content">
            <h1>SYSTEM LOGS</h1>
            <div class="glass-panel" id="log-list">
                <!-- Logs here -->
            </div>
        </div>

        <!-- PESTAÑA BANS -->
        <div id="bans" class="tab-content">
            <h1>SECURITY CENTER</h1>
            <div class="glass-panel">
                <h2>BAN MANAGEMENT</h2>
                <div class="form-row" style="margin-top: 20px;">
                    <div class="input-group"><label>Target (HWID/IP)</label><input type="text" id="ban-target"></div>
                    <div class="input-group"><label>Type</label><input type="text" id="ban-type" placeholder="hwid or ip"></div>
                    <div class="input-group"><label>Reason</label><input type="text" id="ban-reason"></div>
                    <button class="btn" onclick="addBan()">CONFIRM BAN</button>
                </div>
            </div>
            <div class="glass-panel">
                <table id="ban-table">
                    <thead><tr><th>Target</th><th>Type</th><th>Reason</th><th>Date</th></tr></thead>
                    <tbody id="ban-rows"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const TOKEN = "antigravity_admin_secret_2026";

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            loadData();
        }

        async function loadData() {
            const res = await fetch(`/api/admin/data?token=${TOKEN}`);
            const data = await res.json();
            
            // Render Keys
            const kTable = document.getElementById('key-table');
            kTable.innerHTML = '';
            data.keys.reverse().forEach(k => {
                kTable.innerHTML += `<tr>
                    <td class="key-style">${k.key}</td>
                    <td>${k.days === 0 ? 'LIFE' : k.days + 'D'}</td>
                    <td>${k.current_usages}/${k.max_usages}</td>
                    <td>${k.expires_at ? new Date(k.expires_at).toLocaleDateString() : 'NEVER'}</td>
                    <td>
                        <button onclick="resetHwid('${k.key}')" style="background:#333; color:#fff; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">RESET</button>
                        <button onclick="deleteKey('${k.key}')" style="background:rgba(255,0,0,0.1); color:red; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">DEL</button>
                    </td>
                </tr>`;
            });

            // Render Logs
            const logList = document.getElementById('log-list');
            logList.innerHTML = '';
            data.logs.forEach(l => {
                logList.innerHTML += `<div class="log-entry">
                    <span><span class="log-event">[${l.event}]</span> ${l.details}</span>
                    <span class="log-date">${new Date(l.date).toLocaleString()}</span>
                </div>`;
            });

            // Render Bans
            const banTable = document.getElementById('ban-rows');
            banTable.innerHTML = '';
            data.bans.forEach(b => {
                banTable.innerHTML += `<tr><td>${b.target}</td><td>${b.type}</td><td>${b.reason}</td><td>${new Date(b.date).toLocaleDateString()}</td></tr>`;
            });
        }

        async function bulkGen() {
            const amount = document.getElementById('amount').value;
            await fetch('/api/admin/keys/bulk', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: TOKEN,
                    days: document.getElementById('days').value,
                    max_usages: document.getElementById('usages').value,
                    note: document.getElementById('note').value,
                    amount: amount
                })
            });
            Swal.fire('Success', `Generated ${amount} keys!`, 'success');
            loadData();
        }

        async function resetHwid(key) {
            await fetch(`/api/admin/keys/${key}/reset?token=${TOKEN}`, { method: 'POST' });
            Swal.fire('Reset', 'HWID has been cleared', 'info');
            loadData();
        }

        async function addBan() {
            await fetch('/api/admin/bans', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    token: TOKEN,
                    target: document.getElementById('ban-target').value,
                    type: document.getElementById('ban-type').value,
                    reason: document.getElementById('ban-reason').value
                })
            });
            Swal.fire('Banned', 'Target added to blacklist', 'error');
            loadData();
        }

        async function copyAllKeys() {
            const res = await fetch(`/api/admin/data?token=${TOKEN}`);
            const data = await res.json();
            const keysList = data.keys.map(k => k.key).join('\n');
            
            navigator.clipboard.writeText(keysList).then(() => {
                Swal.fire({
                    title: 'COPIED!',
                    text: `${data.keys.length} keys copied. Paste them in Billgang!`,
                    icon: 'success',
                    background: '#0e0e16',
                    color: '#fff',
                    confirmButtonColor: '#7000ff'
                });
            });
        }

        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
