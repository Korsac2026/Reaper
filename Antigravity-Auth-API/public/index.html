<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTIGRAVITY // INFINITY DASHBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050507;
            --card: rgba(20, 20, 25, 0.7);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #e0e0e0;
            --danger: #ff3e3e;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-box: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; }

        /* Fondo Animado */
        .grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px; z-index: -1;
        }

        /* Sidebar Glassmorphism */
        nav {
            width: 280px; height: 100vh; background: var(--card);
            backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1);
            position: fixed; padding: 40px 20px;
        }

        .logo { font-weight: 800; font-size: 24px; color: var(--accent); letter-spacing: 2px; margin-bottom: 50px; text-shadow: 0 0 10px var(--accent-glow); }

        .nav-item {
            padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer;
            transition: 0.3s; color: rgba(255,255,255,0.6); font-weight: 600;
        }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: var(--accent); }

        /* Contenido Principal */
        main { margin-left: 280px; padding: 40px; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: var(--card); padding: 25px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            transition: 0.4s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .stat-card h3 { font-size: 14px; opacity: 0.5; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card p { font-size: 32px; font-weight: 800; color: var(--accent); }

        /* Formulario Advanced */
        .gen-section {
            background: var(--card); padding: 30px; border-radius: 25px;
            margin-bottom: 40px; border: 1px solid rgba(255,255,255,0.1);
        }
        .gen-section h2 { margin-bottom: 25px; font-size: 20px; border-left: 4px solid var(--accent); padding-left: 15px; }

        .input-group { display: flex; gap: 15px; align-items: flex-end; }
        input, select {
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 20px; border-radius: 12px; color: white; width: 200px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        button {
            background: var(--accent); color: #000; border: none; padding: 12px 30px;
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        button:hover { background: #fff; transform: scale(1.05); box-shadow: 0 0 20px #fff; }

        /* Tabla de Keys */
        .table-container { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; opacity: 0.5; font-size: 12px; text-transform: uppercase; }
        td { padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); font-weight: 500; }
        .key-code { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-size: 14px; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .badge-success { background: rgba(0, 255, 136, 0.1); color: var(--success); }
        
        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        main { animation: fadeIn 0.8s ease-out; }
    </style>
</head>
<body>
    <div class="grid"></div>
    
    <nav>
        <div class="logo">ANTIGRAVITY // INF</div>
        <div class="nav-item active">DASHBOARD</div>
        <div class="nav-item">KEY MANAGER</div>
        <div class="nav-item">SECURITY / BANS</div>
        <div class="nav-item">SETTINGS</div>
        <div class="nav-item">LOGOUT</div>
    </nav>

    <main>
        <div class="stats-grid">
            <div class="stat-card"><h3>Active Keys</h3><p>1,284</p></div>
            <div class="stat-card"><h3>Global Bans</h3><p id="ban-count">432</p></div>
            <div class="stat-card"><h3>Uptime</h3><p>99.9%</p></div>
            <div class="stat-card"><h3>Server Load</h3><p>4%</p></div>
        </div>

        <section class="gen-section">
            <h2>GENERATE NEW LICENSE</h2>
            <div class="input-group">
                <div><label>Duration (Days)</label><br><input type="number" id="days" placeholder="0 = Lifetime" value="1"></div>
                <div><label>Max Usages</label><br><input type="number" id="usages" value="1"></div>
                <div><label>Note / User</label><br><input type="text" id="note" placeholder="Customer Name"></div>
                <button onclick="createKey()">Generate Secret Key</button>
            </div>
        </section>

        <section class="table-container">
            <h2>LIVE KEY MONITORING</h2>
            <table>
                <thead>
                    <tr>
                        <th>License Key</th>
                        <th>Duration</th>
                        <th>Usages</th>
                        <th>Status</th>
                        <th>Expiry Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="key-table">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </section>
    </main>

    <script>
        async function createKey() {
            const days = document.getElementById('days').value;
            const usages = document.getElementById('usages').value;
            const note = document.getElementById('note').value;

            const res = await fetch('/api/admin/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: 'antigravity_admin_secret_2026', days, max_usages: usages, note })
            });

            const data = await res.json();
            if (data.success) {
                alert('Key Generated: ' + data.key.key);
                loadKeys();
            }
        }

        async function loadKeys() {
            const res = await fetch('/api/admin/keys?token=antigravity_admin_secret_2026');
            const data = await res.json();
            const container = document.getElementById('key-table');
            container.innerHTML = '';

            data.keys.reverse().forEach(k => {
                container.innerHTML += `
                    <tr>
                        <td class="key-code">${k.key}</td>
                        <td>${k.days == 0 ? 'LIFETIME' : k.days + ' Days'}</td>
                        <td>${k.current_usages}/${k.max_usages}</td>
                        <td><span class="badge badge-success">ACTIVE</span></td>
                        <td>${k.expires_at ? new Date(k.expires_at).toLocaleDateString() : 'NEVER'}</td>
                        <td><button style="padding: 5px 10px; font-size: 10px; background: #333; color: #fff;">REVOKE</button></td>
                    </tr>
                `;
            });
        }

        loadKeys();
        setInterval(loadKeys, 5000); // Auto refresh
    </script>
</body>
</html>
