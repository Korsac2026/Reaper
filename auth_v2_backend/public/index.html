<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaper Auth | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d00ff;
            --secondary: #6e00ff;
            --bg: #060606;
            --card-bg: rgba(20, 20, 20, 0.7);
            --accent: #ff00ea;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(110, 0, 255, 0.1) 0%, transparent 50%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(157, 0, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 25px;
            font-size: 20px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.4);
        }

        .keys-table {
            width: 100%;
            border-collapse: collapse;
        }

        .keys-table th {
            text-align: left;
            padding: 15px;
            color: #777;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .keys-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 15px;
        }

        .status-active { color: #00ff88; }
        .status-expired { color: #ff3366; }

        .key-text {
            font-family: monospace;
            background: rgba(157, 0, 255, 0.1);
            padding: 5px 10px;
            border-radius: 6px;
            color: #e0b0ff;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">REAPER AUTH PANEL</div>
            <div class="user-status">Admin Mode</div>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>Generate Keys</h2>
                <div class="form-group">
                    <label>Duration</label>
                    <select id="duration">
                        <option value="1">1 Day</option>
                        <option value="7">7 Days</option>
                        <option value="30">30 Days</option>
                        <option value="365">1 Year</option>
                    </select>
                </div>
                <button class="btn" onclick="generateKey()">Generate License</button>
                <div id="newKeyDisplay" style="margin-top: 20px; display: none;">
                    <label>New Key:</label>
                    <div class="key-text" id="generatedKey" style="font-size: 18px; text-align: center;"></div>
                </div>
            </div>

            <div class="card">
                <h2>Active Licenses</h2>
                <div style="max-height: 500px; overflow-y: auto;">
                    <table class="keys-table">
                        <thead>
                            <tr>
                                <th>Key</th>
                                <th>Expiry</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="keysList">
                            <!-- Keys will appear here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiBase = '';

        async function fetchKeys() {
            const res = await fetch('/admin/keys');
            const keys = await res.json();
            const list = document.getElementById('keysList');
            list.innerHTML = '';
            
            keys.reverse().forEach(k => {
                const expiryDate = new Date(k.expiry).toLocaleDateString();
                const now = new Date();
                const isExpired = new Date(k.expiry) < now;
                
                list.innerHTML += `
                    <tr>
                        <td><span class="key-text">${k.key}</span></td>
                        <td>${expiryDate}</td>
                        <td class="${isExpired ? 'status-expired' : 'status-active'}">
                            ${isExpired ? 'EXPIRED' : 'ACTIVE'}
                        </td>
                    </tr>
                `;
            });
        }

        async function generateKey() {
            const days = document.getElementById('duration').value;
            const res = await fetch('/admin/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ days })
            });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('newKeyDisplay').style.display = 'block';
                document.getElementById('generatedKey').innerText = data.key;
                fetchKeys();
            }
        }

        fetchKeys();
        // Refresh every 30 seconds
        setInterval(fetchKeys, 30000);
    </script>
</body>
</html>
