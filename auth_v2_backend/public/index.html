<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaper Auth | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9d00ff;
            --secondary: #6e00ff;
            --bg: #060606;
            --card-bg: rgba(20, 20, 20, 0.7);
            --accent: #ff00ea;
            --danger: #ff3366;
            --warning: #ffcc00;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background-color: var(--bg); color: #fff; background-image: radial-gradient(circle at 20% 30%, rgba(157, 0, 255, 0.1) 0%, transparent 50%); min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; 
            padding: 20px; background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: 700; background: linear-gradient(45deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        .card { background: var(--card-bg); backdrop-filter: blur(15px); padding: 30px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); }

        h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 25px; font-size: 18px; color: var(--primary); }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        select, input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: #fff; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px rgba(157, 0, 255, 0.4); }

        .table-container { overflow-x: auto; }
        .keys-table { width: 100%; border-collapse: collapse; }
        .keys-table th { text-align: left; padding: 15px; color: #777; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .keys-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 14px; }

        .key-text { font-family: monospace; background: rgba(157, 0, 255, 0.1); padding: 4px 8px; border-radius: 5px; color: #e0b0ff; }
        .hwid-text { color: #888; font-size: 12px; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .badge-active { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .badge-banned { background: rgba(255, 51, 102, 0.1); color: #ff3366; }

        .action-btn { 
            padding: 6px 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
            background: transparent; color: #fff; cursor: pointer; margin-right: 5px; font-size: 12px;
        }
        .btn-ban { border-color: var(--warning); color: var(--warning); }
        .btn-delete { border-color: var(--danger); color: var(--danger); }
        .action-btn:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">REAPER AUTH V2</div>
            <div>Admin Dashboard</div>
        </header>

        <div class="main-grid">
            <div class="card">
                <h2>Generate</h2>
                <div class="form-group">
                    <label>Duration</label>
                    <select id="duration">
                        <option value="1">1 Day</option>
                        <option value="7">7 Days</option>
                        <option value="30">30 Days</option>
                        <option value="999">Lifetime</option>
                    </select>
                </div>
                <button class="btn" onclick="generateKey()">Create Key</button>
            </div>

            <div class="card">
                <h2>Licenses</h2>
                <div class="table-container">
                    <table class="keys-table">
                        <thead>
                            <tr>
                                <th>License Key</th>
                                <th>Linked HWID</th>
                                <th>Expiry</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="keysList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchKeys() {
            const res = await fetch('/admin/keys');
            const keys = await res.json();
            const list = document.getElementById('keysList');
            list.innerHTML = '';
            
            keys.reverse().forEach(k => {
                const expiryStr = new Date(k.expiry).toLocaleDateString();
                const statusClass = k.status === 'active' ? 'badge-active' : 'badge-banned';
                
                list.innerHTML += `
                    <tr>
                        <td><span class="key-text">${k.key}</span></td>
                        <td><span class="hwid-text">${k.hwid || 'NOT LINKED'}</span></td>
                        <td>${expiryStr}</td>
                        <td><span class="badge ${statusClass}">${k.status.toUpperCase()}</span></td>
                        <td>
                            <button class="action-btn btn-ban" onclick="setStatus('${k.key}', '${k.status === 'active' ? 'banned' : 'active'}')">
                                ${k.status === 'active' ? 'Ban' : 'Unban'}
                            </button>
                            <button class="action-btn btn-delete" onclick="deleteKey('${k.key}')">Remove</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function setStatus(key, status) {
            await fetch('/admin/status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key, status })
            });
            fetchKeys();
        }

        async function deleteKey(key) {
            if(!confirm('Are you sure?')) return;
            await fetch('/admin/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key })
            });
            fetchKeys();
        }

        async function generateKey() {
            const days = document.getElementById('duration').value;
            await fetch('/admin/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ days })
            });
            fetchKeys();
        }

        fetchKeys();
        setInterval(fetchKeys, 10000);
    </script>
</body>
</html>
