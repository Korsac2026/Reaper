



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ω License - Admin Login</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --accent-color: #00535c;
            --text-color: #e0e0e0;
            --input-bg: #1a1a1a;
            --button-bg: #252525;
            --button-hover: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                    radial-gradient(circle at 10% 20%, rgba(0, 111, 128, 0.05) 0%, transparent 30%),
                    radial-gradient(circle at 90% 80%, rgba(0, 111, 128, 0.03) 0%, transparent 40%);
            color: var(--text-color);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            background-color: var(--card-bg);
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8),
            0 0 20px rgba(0, 111, 128, 0.15);
            width: 500px;
            max-width: 90%;
            position: relative;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(0, 111, 128, 0.1);
        }

        .logo-container {
            margin-bottom: 30px;
        }

        h2 {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3),
            0 0 20px var(--accent-color),
            0 0 30px var(--accent-color);
            letter-spacing: 2px;
            font-size: 32px;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 12px;
            color: #999;
            margin-bottom: 30px;
            font-style: italic;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        label {
            position: absolute;
            left: 10px;
            top: -10px;
            font-size: 11px;
            background-color: var(--card-bg);
            padding: 0 8px;
            border-radius: 4px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="password"] {
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: var(--input-bg);
            color: var(--text-color);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 111, 128, 0.3);
        }

        button {
            padding: 12px 30px;
            border-radius: 8px;
            border: none;
            background-color: var(--button-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 14px;
            text-transform: lowercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3),
            0 0 10px rgba(0, 111, 128, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                    to bottom right,
                    rgba(0, 111, 128, 0.1),
                    rgba(0, 111, 128, 0),
                    rgba(0, 111, 128, 0.1)
            );
            transform: rotate(45deg);
            transition: all 0.5s ease;
            opacity: 0;
        }

        button:hover::after {
            animation: shine 1.5s ease;
        }

        @keyframes shine {
            0% {
                opacity: 0;
                transform: translateX(-100%) rotate(45deg);
            }
            30% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
                transform: translateX(100%) rotate(45deg);
            }
        }

        .glow {
            position: absolute;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--accent-color);
            filter: blur(80px);
            opacity: 0.15;
            z-index: -1;
        }

        .glow-1 {
            top: -50px;
            left: -50px;
        }

        .glow-2 {
            bottom: -50px;
            right: -50px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="logo-container">
        <h2>XorAuth v1.1</h2>
        <div class="tagline">- made with <span style="color: var(--accent-color);">♥</span> by stackz</div>
    </div>

    <form action="/login" method="post">
        <div class="form-group">
            <label for="apiKey">Admin Key</label>
            <input type="password" id="apiKey" name="apiKey" required autocomplete="off">
        </div>
        <button type="submit">Authenticate</button>
    </form>
</div>

</body>
</html>
